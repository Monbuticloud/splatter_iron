name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly: Monday 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  actions: read
  checks: write

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: splatter-iron
      - run: cargo fmt --check

  clippy:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: splatter-iron
      - run: cargo clippy --all-targets

  msrv:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: splatter-iron
      - run: cargo check

  test-debug:
    if: github.event_name != 'schedule'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: splatter-iron
      - run: cargo test --features debug-snapshot

  build-release:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: splatter-iron
      - run: cargo build --release

  doc:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: splatter-iron
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  deny:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: splatter-iron
      - run: cargo deny check

  audit:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: splatter-iron
      - run: cargo audit

  coverage:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: splatter-iron
      - run: cargo tarpaulin --out Html --out Xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            tarpaulin-report.html
            cobertura.xml
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
          fail_ci_if_error: false

  test:
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            os-short: linux
            exe: ""
          - os: macos-latest
            os-short: macos
            exe: ""
          - os: windows-latest
            os-short: windows
            exe: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: splatter-iron
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo build
      - name: Install cargo2junit
        run: cargo install cargo2junit
      - run: cargo nextest run --message-format libtest-json-plus > test-results.json
      - run: cargo test --format json | cargo2junit > junit-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os-short }}
          path: |
            test-results.json
            junit-results.xml
      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Test Results (${{ matrix.os-short }})
          path: junit-results.xml
          reporter: java-junit
          fail-on-error: false
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: splatter_iron-${{ matrix.os-short }}
          path: target/debug/splatter_iron${{ matrix.exe }}

  test-release:
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: splatter-iron
      - run: cargo test --release

  ci-cron:
    if: github.event_name == 'schedule'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: splatter-iron
      - run: cargo audit --fetch
      - run: just ci
