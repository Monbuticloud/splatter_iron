[advisories]
vulnerability = "deny"
unmaintained = "warn"
unsound = "deny"
notice = "warn"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[licenses]
unlicensed = "deny"
allow = [
    "AGPL-3.0",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "Unicode-DFS-2016",
    "ISC",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "OpenSSL",
]
default = "deny"
confidence = 0.8

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
