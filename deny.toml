[advisories]
version = 2
unmaintained = "all"
unsound = "all"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[licenses]
version = 2
allow = [
    "AGPL-3.0-only",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "NCSA",
    "Zlib",
    "ISC",
    "MPL-2.0",
    "CC0-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "Unicode-3.0",
    "Unlicense",
]
confidence-threshold = 0.8

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
